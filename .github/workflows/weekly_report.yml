name: Weekly Tech Report Agent

on:
  schedule:
    # 設定每週一早上 01:00 UTC (即台灣時間早上 09:00) 自動執行
    - cron: '0 1 * * 1'
  workflow_dispatch: # 允許你隨時手動在 GitHub 網頁上點擊按鈕執行測試

permissions:
  contents: write # 必須賦予 Actions 權限，它才能把生成的報告寫回你的專案

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    # 1. 檢出程式碼
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 設定 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安裝依賴套件
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 執行 Agent 腳本
    - name: Run Tech Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python agent.py

    # 5. 自動將產生的週報檔案 Git Commit & Push 回儲存庫
    - name: Commit and push report
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add reports/
        # 如果當天完全沒有內容變更，git commit 會失敗，加上 || exit 0 可確保 workflow 正常結束
        git commit -m "Auto-generated technical report $(date +'%Y-%m-%d')" || exit 0
        git push
